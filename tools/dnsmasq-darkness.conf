# dnsmasq config to redirect the dead game server hostname to this machine.
# Only answers for rpg1.dungeonheroine.cafe24.com; everything else is
# forwarded upstream so the phone's normal internet access still works.
#
# Run:   sudo dnsmasq -C dnsmasq-darkness.conf --no-daemon
# Then on the phone: Wi-Fi network -> Modify -> Advanced -> IP settings:
# Static -> DNS 1 = 192.168.1.153 (this machine's LAN IP; update below and
# in the phone settings if it changes)
#
# Stop any system resolver (systemd-resolved) from fighting over port 53
# on this interface -- we bind explicitly to the LAN interface only.

interface=wlan0
bind-interfaces
no-resolv
no-hosts

# real upstream DNS for everything else
server=1.1.1.1
server=8.8.8.8

# the actual redirect
address=/rpg1.dungeonheroine.cafe24.com/192.168.1.153

log-queries
